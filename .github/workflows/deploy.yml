name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: EB + CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      # ── 1. Package and deploy to Elastic Beanstalk ─────────────────
      - name: Create deployment package
        run: zip -r deploy.zip . --exclude "*.git*" --exclude "node_modules/*" --exclude "*.log"

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key:       ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key:       ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region:               us-east-1
          application_name:     liminal-axis
          environment_name:     liminal-axis-env
          version_label:        ${{ github.sha }}
          deployment_package:   deploy.zip
          wait_for_environment_recovery: 60

      # ── 2. Bust CloudFront cache ────────────────────────────────────
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3Q1D0DKV645US \
            --paths "/*"
